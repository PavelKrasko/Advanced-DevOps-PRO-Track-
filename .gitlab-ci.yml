stages:
  - test
  - build
  - docker

test:
  stage: test
  image: python:3.10-slim
  script:
    - pip install pytest
    - echo "Tests passed!"

build:
  stage: build
  image: alpine:latest
  script:
    - echo "Build complete!"

docker-build:
  stage: docker
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - docker --version
    - docker ps
    - echo "Docker works!"