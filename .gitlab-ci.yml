stages:
  - test
  - build
  - deploy

variables:
  CI_REGISTRY: "172.19.0.2:5050"
  CI_REGISTRY_IMAGE: "172.19.0.2:5050/root/my-app"

test:
  stage: test
  image: alpine:latest
  script:
    - echo "Running tests..."
    - echo "Tests passed!"

build:
  stage: build
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - |
      cat > Dockerfile << 'DOCKERFILE'
      FROM alpine:latest
      RUN echo "Hello from GitLab CI!" > /app.txt
      CMD ["cat", "/app.txt"]
      DOCKERFILE
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - echo "Pushed to $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"

deploy:
  stage: deploy
  image: gcr.io/google.com/cloudsdktool/google-cloud-cli:latest
  script:
    - kubectl config use-context root/my-app:my-agent
    - kubectl apply -f k8s/deployment.yml
  environment:
    name: production