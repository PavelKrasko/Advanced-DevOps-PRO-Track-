apiVersion: apps/v1
kind: Deployment
metadata:
  name: busybox-rwx
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: busybox-rwx
  template:
    metadata:
      labels:
        app: busybox-rwx
    spec:
      containers:
      - name: busybox
        image: busybox
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Pod: $(hostname) started" >> /mnt/shared/log.txt;
            while true; do
              date >> /mnt/shared/log.txt;
              sleep 5;
            done
        volumeMounts:
        - name: shared-volume
          mountPath: /mnt/shared
      volumes:
      - name: shared-volume
        persistentVolumeClaim:
          claimName: nfs-pvc
